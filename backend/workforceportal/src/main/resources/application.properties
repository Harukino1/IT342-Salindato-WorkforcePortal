# Project Metadata
spring.application.name=workforceportal
server.port=8080
server.address=0.0.0.0

# MongoDB Atlas Configuration
# The URI will be pulled from your .env file
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=workforce_db

# JWT Security Settings (Custom properties for your JwtUtils class)
# These will also be pulled from your .env file
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Logging (Optional: helps you see if MongoDB connects successfully)
logging.level.org.springframework.data.mongodb=DEBUG